# BunnyFile behind Caddy with automatic HTTPS.
#
# Prerequisites:
#   - DNS A/AAAA record pointing DOMAIN to this host
#   - Replace DOMAIN below and in the Caddyfile
#
# Usage:
#   cp deploy/compose/.env.example deploy/compose/.env
#   docker compose -f deploy/compose/caddy.yml up -d

services:
  bunnyfile:
    image: ghcr.io/OWNER/bunnyfile:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: 3001
      SERVER_HOST: 0.0.0.0
      DATA_DIR: /data/files
      DB_PATH: /data/bunnyfile.sqlite
      # Add your public origin for better-auth CSRF/CORS:
      # TRUSTED_ORIGINS: https://files.example.com
    volumes:
      - bunnyfile-data:/data
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - bunnyfile

networks:
  internal:

volumes:
  bunnyfile-data:
  caddy-data:
  caddy-config:
